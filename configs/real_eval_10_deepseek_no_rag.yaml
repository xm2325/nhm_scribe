extends: configs/real_eval_10_rule.yaml
method_name: deepseek_v4_pro_no_rag
experiment:
  mode: real_image
  title: Herbarium SCRIBE Real-Image Eval 10 DeepSeek V4 Pro Report
llm:
  backend: deepseek_api
  base_url: https://api.deepseek.com
  model_name: deepseek-v4-pro
  temperature: 0.0
  max_tokens: 12000
  timeout_seconds: 300
  retries: 3
  retry_backoff_seconds: 20
rag:
  enabled: false
  use_demo_examples: false
  top_k: 0
outputs:
  prefix: real_eval_10
  prediction_name: deepseek_no_rag
  llm_outputs_name: deepseek_v4_pro_no_rag_outputs.jsonl
  llm_diagnostics_name: deepseek_v4_pro_no_rag_diagnostics.csv
  llm_diagnostics_json_name: deepseek_v4_pro_no_rag_diagnostics.json
