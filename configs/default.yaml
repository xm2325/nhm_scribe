project:
  name: herbarium-scribe-demo
  random_state: 42

paths:
  metadata_csv: data/fixtures/specimen_records.csv
  data_dir: data
  reports_dir: reports

sampling:
  demo_size: 2
  eval_size: 10
  stratify_by: institutionCode
  prefer_institution_disjoint: true

metadata:
  input_csv: data/fixtures/specimen_records.csv

image:
  allow_download: false
  timeout_seconds: 20
  retries: 0
  retry_backoff_seconds: 2
  min_bytes: 1024

layout:
  strategy: auto
  fallback: full_image_or_fixture_text
  structured_prompt_headers: false
  gpu: false
  component_confidence: 0.25
  field_confidence: 0.20
  sheet_component_resolution: 1280
  label_field_resolution: 1280
  max_primary_labels: 2
  max_fields_per_label: 20
  include_whole_sheet: true
  include_primary_labels: true
  include_label_fields: true
  include_supplemental_components: true
  whole_sheet_tesseract_config: ""
  primary_label_tesseract_config: "--psm 6"
  field_tesseract_config: "--psm 7"
  supplemental_tesseract_config: "--psm 7"
  field_padding_fraction: 0.08
  field_white_border_pixels: 10
  primary_label_padding_fraction: 0.02

ocr:
  backend: tesseract
  tesseract_lang: eng
  tesseract_config: ""
  allow_fixture_text: true
  include_region_labels_in_prompt: false

llm:
  backend: none
  model: null
  temperature: 0.0
  evidence_gate:
    enabled: false
    require_image: true
    min_alphanumeric_characters: 1

rag:
  top_k: 3
  use_demo_examples: true
  use_authority_cache: true

reconciliation:
  use_gbif_api: false
  gbif_cache_path: data/processed/gbif_match_cache.json

evaluation:
  review:
    min_confidence: 0.75
    high_risk_min_confidence: 0.90
    accepted_support_statuses:
      - direct
    high_risk_fields:
      - country
      - stateProvince
      - eventDate
      - recordedBy
      - decimalLatitude
      - decimalLongitude
  fields:
    - catalogNumber
    - scientificName
    - recordedBy
    - eventDate
    - country
    - stateProvince
    - decimalLatitude
    - decimalLongitude
    - typeStatus
