extends: configs/real_eval_1_rule.yaml
method_name: nvidia_deepseek_v4_pro_no_rag
llm:
  backend: nvidia_api
  base_url: https://integrate.api.nvidia.com/v1
  model_name: deepseek-ai/deepseek-v4-pro
  temperature: 0.0
  max_tokens: 600
  timeout_seconds: 300
  retries: 3
  retry_backoff_seconds: 60
  min_interval_seconds: 65
rag:
  enabled: false
  use_demo_examples: false
  top_k: 0
outputs:
  prefix: real_eval_1
  prediction_name: nvidia_deepseek_no_rag
  llm_artifact_family: nvidia_deepseek_v4_pro_eval1
  llm_outputs_name: nvidia_deepseek_v4_pro_eval1_no_rag_outputs.jsonl
  llm_diagnostics_name: nvidia_deepseek_v4_pro_eval1_no_rag_diagnostics.csv
  llm_diagnostics_json_name: nvidia_deepseek_v4_pro_eval1_no_rag_diagnostics.json
