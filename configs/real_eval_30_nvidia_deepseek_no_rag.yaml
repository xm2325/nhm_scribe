extends: configs/real_eval_30_rule.yaml
method_name: nvidia_deepseek_v4_pro_no_rag
experiment:
  mode: real_image
  title: Herbarium SCRIBE Real-Image Eval 30 NVIDIA DeepSeek V4 Pro Report
llm:
  backend: nvidia_api
  base_url: https://integrate.api.nvidia.com/v1
  model_name: deepseek-ai/deepseek-v4-pro
  temperature: 0.0
  max_tokens: 1200
  timeout_seconds: 120
  retries: 1
  retry_backoff_seconds: 5
  min_interval_seconds: 2.0
rag:
  enabled: false
  use_demo_examples: false
  top_k: 0
outputs:
  prefix: real_eval_30
  prediction_name: nvidia_deepseek_no_rag
  llm_artifact_family: nvidia_deepseek_v4_pro_eval30
  llm_outputs_name: nvidia_deepseek_v4_pro_eval30_no_rag_outputs.jsonl
  llm_diagnostics_name: nvidia_deepseek_v4_pro_eval30_no_rag_diagnostics.csv
  llm_diagnostics_json_name: nvidia_deepseek_v4_pro_eval30_no_rag_diagnostics.json
