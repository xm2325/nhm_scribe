extends: configs/default.yaml
method_name: deepseek_v4_pro_rag
experiment:
  mode: fixture_only
  title: Herbarium SCRIBE Fixture Eval 10 DeepSeek V4 Pro Report
sampling:
  demo_size: 2
  eval_size: 10
  stratify_by: institutionCode
  prefer_institution_disjoint: true
image:
  allow_download: false
ocr:
  backend: tesseract
  allow_fixture_text: true
llm:
  backend: deepseek_api
  base_url: https://api.deepseek.com
  model_name: deepseek-v4-pro
  temperature: 0.0
  max_tokens: 1200
  timeout_seconds: 120
  retries: 1
  retry_backoff_seconds: 5
rag:
  enabled: true
  use_demo_examples: true
  top_k: 3
outputs:
  prefix: eval_10
  prediction_name: deepseek_rag
  llm_outputs_name: deepseek_v4_pro_rag_outputs.jsonl
  rag_contexts_name: deepseek_v4_pro_rag_contexts.jsonl
  llm_diagnostics_name: deepseek_v4_pro_rag_diagnostics.csv
  llm_diagnostics_json_name: deepseek_v4_pro_rag_diagnostics.json
  combine_prediction_files:
    - eval_10_predictions_rule.csv
    - eval_10_predictions_deepseek_no_rag.csv
    - eval_10_predictions_deepseek_rag.csv
  report_name: eval_10_deepseek_v4_pro_report.md
graph:
  preferred_method: deepseek_v4_pro_rag
