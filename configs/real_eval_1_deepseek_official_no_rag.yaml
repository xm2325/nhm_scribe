extends: configs/real_eval_1_rule.yaml
method_name: deepseek_v4_pro_no_rag
experiment:
  mode: real_image
  title: Herbarium SCRIBE DeepSeek Official API 1-Record Smoke Report
llm:
  backend: deepseek_api
  base_url: https://api.deepseek.com
  model_name: deepseek-v4-pro
  temperature: 0.0
  max_tokens: 3000
  timeout_seconds: 300
  retries: 3
  retry_backoff_seconds: 60
rag:
  enabled: false
  use_demo_examples: false
  top_k: 0
outputs:
  prefix: real_eval_1
  prediction_name: deepseek_official_no_rag
  llm_artifact_family: deepseek_v4_pro_eval1_official
  llm_outputs_name: deepseek_v4_pro_eval1_official_no_rag_outputs.jsonl
  llm_diagnostics_name: deepseek_v4_pro_eval1_official_no_rag_diagnostics.csv
  llm_diagnostics_json_name: deepseek_v4_pro_eval1_official_no_rag_diagnostics.json
  report_name: real_eval_1_deepseek_official_smoke_report.md
