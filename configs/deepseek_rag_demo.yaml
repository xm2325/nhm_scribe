extends: configs/default.yaml
sampling:
  demo_size: 2
  eval_size: 1
llm:
  backend: nvidia_api
  base_url: https://integrate.api.nvidia.com/v1
  model: deepseek-ai/deepseek-v4-pro
  temperature: 0.0
  max_tokens: 600
  timeout_seconds: 300
  retries: 3
  retry_backoff_seconds: 45
rag:
  top_k: 3
  use_demo_examples: true
  use_authority_cache: true
graph:
  preferred_method: nvidia_api_rag
