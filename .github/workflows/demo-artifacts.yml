name: demo artifacts

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  demo-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run tests
        run: python -m pytest
      - name: Run reproducible demo pipeline
        run: python scripts/run_pipeline.py --config configs/demo_10.yaml
      - name: Upload demo outputs
        uses: actions/upload-artifact@v4
        with:
          name: herbarium-scribe-demo-${{ github.run_id }}
          retention-days: 30
          path: |
            data/processed/
            data/interim/ocr/
            data/interim/llm/
            reports/

  real-eval10-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install OCR system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Check DeepSeek API configuration
        id: deepseek-config
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: |
          mkdir -p data/processed data/interim/ocr data/interim/llm reports
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "api_key_present=false" >> "$GITHUB_OUTPUT"
            printf '%s\n' \
              '# DeepSeek V4 Pro API key not configured' \
              '' \
              'The real eval-10 job will still run rule_ocr and produce diagnostics, but DeepSeek methods will be marked not evaluated.' \
              '' \
              'Add a repository secret named `DEEPSEEK_API_KEY` to run the direct DeepSeek API path.' \
              > reports/deepseek_api_key_not_configured.md
          else
            echo "api_key_present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run tests
        run: python -m pytest
      - name: Run RBGE E00633257 smoke test
        run: python scripts/run_pipeline.py --config configs/rbge_e00633257_smoke.yaml
      - name: Run real eval-10 rule baseline
        run: python scripts/run_pipeline.py --config configs/real_eval_10_rule.yaml
      - name: Run real eval-10 DeepSeek no-RAG pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python scripts/run_pipeline.py --config configs/real_eval_10_deepseek_no_rag.yaml
      - name: Run real eval-10 DeepSeek RAG pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python scripts/run_pipeline.py --config configs/real_eval_10_deepseek_rag.yaml
      - name: Verify real eval-10 outputs
        run: |
          python - <<'PY'
          import json
          import pathlib
          import pandas as pd

          processed = pathlib.Path("data/processed")
          eval_set = pd.read_csv(processed / "real_eval_10_eval_set.csv")
          if len(eval_set) < 10:
              print(f"::error::Expected at least 10 EVAL records, got {len(eval_set)}")
              raise SystemExit(1)

          required = [
              "real_eval_10_image_manifest.csv",
              "real_eval_10_ocr_by_region.csv",
              "real_eval_10_predictions_rule.csv",
              "real_eval_10_predictions_deepseek_no_rag.csv",
              "real_eval_10_predictions_deepseek_rag.csv",
              "real_eval_10_evaluation_summary.csv",
              "real_eval_10_evaluation_by_ocr_tertile.csv",
          ]
          missing = [name for name in required if not (processed / name).exists()]
          if missing:
              print(f"::error::Missing expected outputs: {missing}")
              raise SystemExit(1)

          raw_files = [
              pathlib.Path("data/interim/llm/deepseek_v4_pro_no_rag_outputs.jsonl"),
              pathlib.Path("data/interim/llm/deepseek_v4_pro_rag_outputs.jsonl"),
          ]
          rows = []
          for path in raw_files:
              if path.exists():
                  rows.extend(json.loads(line) for line in path.read_text(encoding="utf-8").splitlines() if line.strip())
          nonempty = sum(bool(r.get("raw_output")) for r in rows)
          rag = pathlib.Path("data/interim/llm/deepseek_v4_pro_rag_contexts.jsonl")
          if not rag.exists():
              print("::error::RAG contexts were not written")
              raise SystemExit(1)
          if nonempty == 0:
              print("::warning::DeepSeek API produced no raw outputs. This usually means DEEPSEEK_API_KEY is absent, the model name is unavailable, or the API returned an error.")
          else:
              parsed = sum(r.get("parse_failure") is False for r in rows)
              print(f"DeepSeek raw outputs: {nonempty}/{len(rows)}; parsed: {parsed}")
          PY
      - name: Upload real eval-10 DeepSeek outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: herbarium-scribe-real-eval10-deepseek-${{ github.run_id }}
          retention-days: 30
          path: |
            data/processed/
            data/interim/ocr/
            data/interim/llm/
            reports/
