name: demo artifacts

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  demo-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run tests
        run: python -m pytest
      - name: Run reproducible demo pipeline
        run: python scripts/run_pipeline.py --config configs/demo_10.yaml
      - name: Upload demo outputs
        uses: actions/upload-artifact@v4
        with:
          name: herbarium-scribe-demo-${{ github.run_id }}
          retention-days: 30
          path: |
            data/processed/
            data/interim/ocr/
            data/interim/llm/
            reports/

  real-eval10-artifacts:
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, '[run-eval30]') && !contains(github.event.head_commit.message, '[run-nvidia-smoke]') && !contains(github.event.head_commit.message, '[run-deepseek-smoke]')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install OCR system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Check NVIDIA API configuration
        id: nvidia-config
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
          NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
          NVIDIA_MODEL: deepseek-ai/deepseek-v4-pro
        run: |
          mkdir -p data/processed data/interim/ocr data/interim/llm reports
          if [ -z "${NVIDIA_API_KEY}${NGC_API_KEY}" ]; then
            echo "api_key_present=false" >> "$GITHUB_OUTPUT"
            printf '%s\n' \
              '# NVIDIA DeepSeek V4 Pro API key not configured' \
              '' \
              'The real eval-10 job will still run rule_ocr and produce diagnostics, but NVIDIA DeepSeek methods will be marked not evaluated.' \
              '' \
              'Add a repository secret named `NVIDIA_API_KEY` or `NGC_API_KEY` to run the NVIDIA Build DeepSeek path.' \
              > reports/nvidia_api_key_not_configured.md
          else
            echo "api_key_present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run tests
        run: python -m pytest
      - name: Run RBGE E00633257 smoke test
        run: python scripts/run_pipeline.py --config configs/rbge_e00633257_smoke.yaml
      - name: Run real eval-10 rule baseline
        run: python scripts/run_pipeline.py --config configs/real_eval_10_rule.yaml
      - name: Run real eval-10 NVIDIA DeepSeek no-RAG pipeline
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
          NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
          NVIDIA_MODEL: deepseek-ai/deepseek-v4-pro
        run: python scripts/run_pipeline.py --config configs/real_eval_10_nvidia_deepseek_no_rag.yaml
      - name: Run real eval-10 NVIDIA DeepSeek RAG pipeline
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
          NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
          NVIDIA_MODEL: deepseek-ai/deepseek-v4-pro
        run: python scripts/run_pipeline.py --config configs/real_eval_10_nvidia_deepseek_rag.yaml
      - name: Verify real eval-10 outputs
        run: |
          python - <<'PY'
          import json
          import pathlib
          import pandas as pd

          processed = pathlib.Path("data/processed")
          eval_set = pd.read_csv(processed / "real_eval_10_eval_set.csv")
          if len(eval_set) < 10:
              print(f"::error::Expected at least 10 EVAL records, got {len(eval_set)}")
              raise SystemExit(1)

          required = [
              "real_eval_10_image_manifest.csv",
              "real_eval_10_ocr_by_region.csv",
              "real_eval_10_predictions_rule.csv",
              "real_eval_10_predictions_nvidia_deepseek_no_rag.csv",
              "real_eval_10_predictions_nvidia_deepseek_rag.csv",
              "real_eval_10_evaluation_summary.csv",
              "real_eval_10_evaluation_by_ocr_tertile.csv",
          ]
          missing = [name for name in required if not (processed / name).exists()]
          if missing:
              print(f"::error::Missing expected outputs: {missing}")
              raise SystemExit(1)

          required_paths = [
              pathlib.Path("data/interim/llm/nvidia_deepseek_v4_pro_no_rag_outputs.jsonl"),
              pathlib.Path("data/interim/llm/nvidia_deepseek_v4_pro_rag_outputs.jsonl"),
              pathlib.Path("data/interim/llm/nvidia_deepseek_v4_pro_rag_contexts.jsonl"),
              pathlib.Path("reports/real_eval_10_nvidia_deepseek_v4_pro_report.md"),
          ]
          missing_paths = [str(path) for path in required_paths if not path.exists()]
          if missing_paths:
              print(f"::error::Missing expected LLM/report outputs: {missing_paths}")
              raise SystemExit(1)

          raw_files = [
              pathlib.Path("data/interim/llm/nvidia_deepseek_v4_pro_no_rag_outputs.jsonl"),
              pathlib.Path("data/interim/llm/nvidia_deepseek_v4_pro_rag_outputs.jsonl"),
          ]
          rows = []
          for path in raw_files:
              if path.exists():
                  rows.extend(json.loads(line) for line in path.read_text(encoding="utf-8").splitlines() if line.strip())
          nonempty = sum(bool(r.get("raw_output")) for r in rows)
          rag = pathlib.Path("data/interim/llm/nvidia_deepseek_v4_pro_rag_contexts.jsonl")
          if not rag.exists():
              print("::error::RAG contexts were not written")
              raise SystemExit(1)
          if nonempty == 0:
              print("::warning::NVIDIA DeepSeek API produced no raw outputs. This usually means NVIDIA_API_KEY is absent, the model name is unavailable, rate limited, or the API returned an error.")
          else:
              parsed = sum(r.get("parse_failure") is False for r in rows)
              print(f"NVIDIA DeepSeek raw outputs: {nonempty}/{len(rows)}; parsed: {parsed}")
          PY
      - name: Upload real eval-10 NVIDIA DeepSeek outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: herbarium-scribe-real-eval10-nvidia-deepseek-${{ github.run_id }}
          retention-days: 30
          path: |
            data/processed/
            data/interim/ocr/
            data/interim/llm/
            reports/
            
  deepseek-official-eval10:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[run-deepseek-eval10]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCR system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Check DeepSeek official API configuration
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: |
          mkdir -p data/processed data/interim/ocr data/interim/llm reports
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "::error::DEEPSEEK_API_KEY is not configured"
            exit 1
          fi
          echo "DeepSeek official API key is configured."

      - name: Run tests
        run: python -m pytest

      - name: Run real eval-10 rule baseline
        run: python scripts/run_pipeline.py --config configs/real_eval_10_rule.yaml

      - name: Run real eval-10 DeepSeek official no-RAG pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python scripts/run_pipeline.py --config configs/real_eval_10_deepseek_no_rag.yaml

      - name: Run real eval-10 DeepSeek official RAG pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python scripts/run_pipeline.py --config configs/real_eval_10_deepseek_rag.yaml

      - name: Verify DeepSeek official eval-10 outputs
        run: |
          python - <<'PY'
          import json
          import pathlib
          import pandas as pd

          processed = pathlib.Path("data/processed")
          llm_dir = pathlib.Path("data/interim/llm")
          reports = pathlib.Path("reports")

          required = [
              processed / "real_eval_10_eval_set.csv",
              processed / "real_eval_10_image_manifest.csv",
              processed / "real_eval_10_ocr_combined.csv",
              processed / "real_eval_10_predictions_rule.csv",
              processed / "real_eval_10_predictions_deepseek_no_rag.csv",
              processed / "real_eval_10_predictions_deepseek_rag.csv",
              processed / "real_eval_10_evaluation_summary.csv",
              processed / "real_eval_10_evaluation_by_ocr_tertile.csv",
              llm_dir / "deepseek_v4_pro_no_rag_outputs.jsonl",
              llm_dir / "deepseek_v4_pro_rag_outputs.jsonl",
              llm_dir / "deepseek_v4_pro_rag_contexts.jsonl",
              reports / "real_eval_10_deepseek_v4_pro_report.md",
          ]

          missing = [str(p) for p in required if not p.exists()]
          if missing:
              print(f"::error::Missing expected outputs: {missing}")
              raise SystemExit(1)

          eval_set = pd.read_csv(processed / "real_eval_10_eval_set.csv")
          if len(eval_set) != 10:
              print(f"::error::Expected 10 EVAL records, got {len(eval_set)}")
              raise SystemExit(1)

          rows = []
          for path in [
              llm_dir / "deepseek_v4_pro_no_rag_outputs.jsonl",
              llm_dir / "deepseek_v4_pro_rag_outputs.jsonl",
          ]:
              rows.extend(
                  json.loads(line)
                  for line in path.read_text(encoding="utf-8").splitlines()
                  if line.strip()
              )

          nonempty = sum(bool(r.get("raw_output")) for r in rows)
          parsed = sum((r.get("parse_failure") is False) and bool(r.get("raw_output")) for r in rows)
          not_evaluated = sum(bool(r.get("not_evaluated")) for r in rows)

          print(f"DeepSeek official raw outputs: {nonempty}/{len(rows)}")
          print(f"DeepSeek official parsed outputs: {parsed}/{len(rows)}")
          print(f"DeepSeek official not evaluated: {not_evaluated}/{len(rows)}")

          if nonempty == 0:
              print("::error::DeepSeek official API produced no raw outputs.")
              raise SystemExit(1)
          PY

      - name: Upload DeepSeek official eval-10 outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: herbarium-scribe-deepseek-official-eval10-${{ github.run_id }}
          retention-days: 30
          path: |
            data/processed/
            data/interim/ocr/
            data/interim/llm/
            reports/
