name: Hespi v3 five-record calibration

on:
  push:
    branches:
      - main
    paths:
      - .github/run-hespi-v3-nonthinking.trigger
  workflow_dispatch:
    inputs:
      run_mode:
        description: Select one smoke test or the complete three-way comparison
        required: true
        default: nonthinking_hybrid
        type: choice
        options:
          - nonthinking_hybrid
          - thinking_hybrid
          - nonthinking_lean
          - comparison

jobs:
  calibration:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      RUN_MODE: ${{ inputs.run_mode || 'nonthinking_hybrid' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY_SELF }}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-v4-pro
      DEEPSEEK_MIN_INTERVAL_SECONDS: "1.0"
    steps:
      - name: Checkout repository anonymously
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache Hespi model downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/hespi
          key: hespi-0.6.2-${{ runner.os }}

      - name: Install OCR system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install package with Hespi
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,hespi]'

      - name: Check DeepSeek official API configuration
        run: |
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "::error::Repository secret DEEPSEEK_API_KEY_SELF is not configured"
            exit 1
          fi

      - name: Run tests
        run: python -m pytest

      - name: Build validated shared image set
        run: |
          mkdir -p reports/hespi_v2 reports/hespi_v3_calibration
          set -o pipefail
          python scripts/prepare_hespi_v2_paired_eval.py 2>&1 | tee reports/hespi_v3_calibration/acquisition.log

      - name: Run thinking hybrid
        if: env.RUN_MODE == 'thinking_hybrid' || env.RUN_MODE == 'comparison'
        run: python scripts/run_pipeline.py --config configs/hespi_v3_eval5_thinking_hybrid.yaml

      - name: Run non-thinking hybrid
        if: env.RUN_MODE == 'nonthinking_hybrid' || env.RUN_MODE == 'comparison'
        run: python scripts/run_pipeline.py --config configs/hespi_v3_eval5_nonthinking_hybrid.yaml

      - name: Run non-thinking lean hybrid
        if: env.RUN_MODE == 'nonthinking_lean' || env.RUN_MODE == 'comparison'
        run: python scripts/run_pipeline.py --config configs/hespi_v3_eval5_nonthinking_lean.yaml

      - name: Build calibration report
        run: python scripts/compare_hespi_v3_calibration.py

      - name: Verify completed calibration outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          specs = {
              "thinking_hybrid": ("data/experiments/hespi_v3_thinking_hybrid", "hespi_v3_thinking_hybrid", "hespi_v3_thinking_hybrid_outputs.jsonl"),
              "nonthinking_hybrid": ("data/experiments/hespi_v3_nonthinking_hybrid", "hespi_v3_nonthinking_hybrid", "hespi_v3_nonthinking_hybrid_outputs.jsonl"),
              "nonthinking_lean": ("data/experiments/hespi_v3_nonthinking_lean", "hespi_v3_nonthinking_lean", "hespi_v3_nonthinking_lean_outputs.jsonl"),
          }
          completed = 0
          for name, (root_value, prefix, llm_name) in specs.items():
              root = Path(root_value)
              eval_path = root / "processed" / f"{prefix}_eval_set.csv"
              if not eval_path.exists():
                  continue
              completed += 1
              eval_set = pd.read_csv(eval_path, dtype=str).fillna("")
              if len(eval_set) != 5:
                  raise SystemExit(f"{name}: expected 5 EVAL records, got {len(eval_set)}")
              rows = [
                  json.loads(line)
                  for line in (root / "interim" / "llm" / llm_name).read_text(encoding="utf-8").splitlines()
                  if line.strip()
              ]
              parsed = [
                  row for row in rows
                  if row.get("raw_output") and row.get("parse_failure") is False and not row.get("not_evaluated")
              ]
              if len(parsed) != 5:
                  raise SystemExit(f"{name}: expected 5 parsed DeepSeek records, got {len(parsed)}")
          if completed == 0:
              raise SystemExit("No calibration pipeline completed")
          report = Path("reports/hespi_v3_calibration/hespi_v3_calibration_report.md")
          if not report.exists():
              raise SystemExit("Calibration report was not generated")
          print(report)
          PY

      - name: Upload calibration outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: herbarium-scribe-hespi-v3-calibration-${{ env.RUN_MODE }}-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            data/experiments/hespi_v2_shared/processed/
            data/experiments/hespi_v3_thinking_hybrid/processed/
            data/experiments/hespi_v3_thinking_hybrid/interim/ocr/
            data/experiments/hespi_v3_thinking_hybrid/interim/llm/
            data/experiments/hespi_v3_nonthinking_hybrid/processed/
            data/experiments/hespi_v3_nonthinking_hybrid/interim/ocr/
            data/experiments/hespi_v3_nonthinking_hybrid/interim/llm/
            data/experiments/hespi_v3_nonthinking_lean/processed/
            data/experiments/hespi_v3_nonthinking_lean/interim/ocr/
            data/experiments/hespi_v3_nonthinking_lean/interim/llm/
            reports/hespi_v3_calibration/
