name: Hespi v6 eval10 catalog number OCR ensemble

on:
  push:
    branches:
      - main
    paths:
      - .github/run-hespi-v6-eval10.trigger
  workflow_dispatch:

jobs:
  eval10:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY_SELF }}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-v4-pro
      DEEPSEEK_MIN_INTERVAL_SECONDS: "1.0"
    steps:
      - name: Checkout repository anonymously
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache Hespi model downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/hespi
          key: hespi-0.6.2-${{ runner.os }}

      - name: Install OCR system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install package with Hespi
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,hespi]'

      - name: Check DeepSeek official API configuration
        run: |
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "::error::Repository secret DEEPSEEK_API_KEY_SELF is not configured"
            exit 1
          fi

      - name: Run tests
        run: python -m pytest

      - name: Build validated shared image set
        run: |
          mkdir -p reports/hespi_v6_eval10
          set -o pipefail
          python scripts/prepare_hespi_v2_paired_eval.py 2>&1 | tee reports/hespi_v6_eval10/acquisition.log

      - name: Run catalog number OCR ensemble eval10
        run: python scripts/run_pipeline.py --config configs/hespi_v6_eval10_number_ensemble.yaml

      - name: Build improvement report and review bundle
        run: |
          python scripts/report_hespi_v6_eval10.py
          python scripts/build_hespi_v4_review_bundle.py \
            --processed-dir data/experiments/hespi_v6_eval10/processed \
            --output-dir reports/hespi_v6_eval10/review_bundle

      - name: Verify eval10 outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path("data/experiments/hespi_v6_eval10")
          eval_set = pd.read_csv(root / "processed/eval_set.csv", dtype=str).fillna("")
          if len(eval_set) != 10:
              raise SystemExit(f"Expected 10 EVAL records, got {len(eval_set)}")
          rows = [
              json.loads(line)
              for line in (root / "interim/llm/hespi_v6_eval10_outputs.jsonl").read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          parsed = [
              row for row in rows
              if row.get("raw_output") and row.get("parse_failure") is False and not row.get("not_evaluated")
          ]
          if len(parsed) != 10:
              raise SystemExit(f"Expected 10 parsed records, got {len(parsed)}")
          ocr = pd.read_csv(root / "processed/ocr_by_region.csv", dtype=str).fillna("")
          ensemble = ocr[ocr["ocr_engine"].eq("tesseract_catalog_number_ensemble")]
          if ensemble.empty:
              raise SystemExit("Expected at least one catalog-number OCR ensemble region")
          if not ensemble["ocr_ensemble_used"].astype(str).str.lower().eq("true").all():
              raise SystemExit("Catalog-number ensemble diagnostics are incomplete")
          report = Path("reports/hespi_v6_eval10/hespi_v6_improvement_report.md")
          if not report.exists():
              raise SystemExit("Missing Hespi v6 improvement report")
          print(report)
          PY

      - name: Upload eval10 outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: herbarium-scribe-hespi-v6-eval10-${{ github.run_id }}
          retention-days: 30
          path: |
            data/experiments/hespi_v2_shared/processed/
            data/experiments/hespi_v6_eval10/processed/
            data/experiments/hespi_v6_eval10/interim/ocr/
            data/experiments/hespi_v6_eval10/interim/llm/
            reports/hespi_v6_eval10/
