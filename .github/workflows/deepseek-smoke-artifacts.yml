name: DeepSeek official smoke artifacts

on:
  workflow_dispatch:

jobs:
  deepseek-smoke-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository anonymously
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout --detach FETCH_HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install OCR system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Check DeepSeek official API configuration
        env:
          DEEPSEEK_API_KEY_SELF: ${{ secrets.DEEPSEEK_API_KEY_SELF }}
        run: |
          mkdir -p data/processed data/interim/ocr data/interim/llm reports
          if [ -z "${DEEPSEEK_API_KEY_SELF}" ]; then
            printf '%s\n' \
              '# DeepSeek official API key not configured' \
              '' \
              'The smoke job will still run rule_ocr and produce diagnostics, but DeepSeek official API extraction will be marked not evaluated.' \
              '' \
              'Add a repository secret named `DEEPSEEK_API_KEY_SELF` to run the DeepSeek official API path.' \
              > reports/deepseek_official_api_key_not_configured.md
          fi
      - name: Run tests
        run: python -m pytest
      - name: Run real eval-1 rule baseline
        run: python scripts/run_pipeline.py --config configs/real_eval_1_rule.yaml
      - name: Run real eval-1 DeepSeek official no-RAG smoke
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY_SELF }}
          DEEPSEEK_API_KEY_SELF: ${{ secrets.DEEPSEEK_API_KEY_SELF }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python scripts/run_pipeline.py --config configs/real_eval_1_deepseek_official_no_rag.yaml
      - name: Inspect DeepSeek official smoke output
        run: |
          python - <<'PY'
          import json
          import pathlib
          import pandas as pd

          processed = pathlib.Path("data/processed")
          eval_set = pd.read_csv(processed / "real_eval_1_eval_set.csv")
          if len(eval_set) != 1:
              print(f"::error::Expected exactly 1 EVAL record, got {len(eval_set)}")
              raise SystemExit(1)

          required = [
              processed / "real_eval_1_image_manifest.csv",
              processed / "real_eval_1_ocr_by_region.csv",
              processed / "real_eval_1_predictions_rule.csv",
              processed / "real_eval_1_predictions_deepseek_official_no_rag.csv",
              processed / "real_eval_1_evaluation_summary.csv",
              pathlib.Path("data/interim/llm/deepseek_v4_pro_eval1_official_no_rag_outputs.jsonl"),
              pathlib.Path("reports/real_eval_1_deepseek_official_smoke_report.md"),
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              print(f"::error::Missing expected smoke outputs: {missing}")
              raise SystemExit(1)

          path = pathlib.Path("data/interim/llm/deepseek_v4_pro_eval1_official_no_rag_outputs.jsonl")
          rows = [json.loads(line) for line in path.read_text(encoding="utf-8").splitlines() if line.strip()]
          nonempty = sum(bool(row.get("raw_output")) for row in rows)
          parsed = sum(bool(row.get("raw_output")) and row.get("parse_failure") is False and not row.get("not_evaluated") for row in rows)
          print(f"DeepSeek official no-RAG smoke raw outputs: {nonempty}/{len(rows)}; parsed: {parsed}")
          if rows:
              first = rows[0]
              print(f"Backend: {first.get('backend')}")
              print(f"Requested model: {first.get('requested_model')}")
              print(f"Actual model: {first.get('actual_model_if_available')}")
              print(f"Raw output length: {first.get('raw_output_length')}")
              print(f"Parse failure: {first.get('parse_failure')}")
              print(f"Not evaluated: {first.get('not_evaluated')}")
          if nonempty == 0:
              print("::warning::DeepSeek official API produced no raw output.")
          elif parsed == 0:
              print("::warning::DeepSeek official API returned raw output but it did not parse.")
          PY
      - name: Upload DeepSeek official smoke outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: herbarium-scribe-deepseek-official-smoke-${{ github.run_id }}
          retention-days: 30
          path: |
            data/processed/
            data/interim/ocr/
            data/interim/llm/
            reports/
